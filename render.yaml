services:
  - type: web
    name: novera-drone-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/drone-business.db
    disks:
      - name: drone-data
        mountPath: /var/data
        sizeGB: 1

  - type: static
    name: novera-drone-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://novera-drone-api.onrender.com/api
